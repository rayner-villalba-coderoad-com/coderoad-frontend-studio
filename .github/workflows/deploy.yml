name: Deploy Hugo to S3

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent deployment
concurrency:
  group: "deploy"
  cancel-in-progress: true

env:
  HUGO_VERSION: "0.156.0"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # Required for OIDC auth with AWS
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Build site
        run: hugo --minify

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/githubconnect
          aws-region: us-east-1

      - name: Deploy to S3
        run: |
          aws s3 sync public/ s3://${{ vars.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "max-age=86400"

      # - name: Invalidate CloudFront cache (optional)
      #   if: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID != '' }}
      #   run: |
      #     aws cloudfront create-invalidation \
      #       --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
      #       --paths "/*"
